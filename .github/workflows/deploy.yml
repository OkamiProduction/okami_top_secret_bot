name: Deploy to Staging

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: GOOS=linux GOARCH=amd64 go build -o tgbot .

      - name: Copy binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          source: "tgbot"
          target: "/opt/tgbot/"
          strip_components: 0
          overwrite: true

      - name: Create .env and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            set -e
            sudo tee /opt/tgbot/.env > /dev/null << EOF
            TELEGRAM_TOKEN=${{ secrets.STAGING_BOT_TOKEN }}
            DEBUG=${{ secrets.STAGING_BOT_DEBUG }}
            LOG_LEVEL=${{ secrets.STAGING_BOT_LOG_LEVEL }}
            LOG_FILE=/var/log/tgbot/bot.log
            EOF
            sudo chown tgbot:tgbot /opt/tgbot/.env
            sudo chmod 600 /opt/tgbot/.env
            sudo chown tgbot:tgbot /opt/tgbot/tgbot
            sudo chmod +x /opt/tgbot/tgbot
            sudo systemctl restart tgbot
            echo "✅ Staging деплой завершён"

      - name: Send Telegram notification (success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          message: |
            ✅ *CI/CD Success*
            Commit: `${{ github.sha }}`
            Message: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}
            [View changes](${{ github.event.head_commit.url }})

      - name: Send Telegram notification (failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          message: |
            ❌ *CI/CD Failed*
            Commit: `${{ github.sha }}`
            Author: ${{ github.actor }}
            [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})